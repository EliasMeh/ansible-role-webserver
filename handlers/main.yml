---
# handlers file for ansible-role-webserver
# Handlers are triggered by 'notify' in tasks.
# They use OS-specific commands loaded by include_vars.

# ── Ubuntu/Debian ────────────────────────────────────────────────────────────
- name: Restart webserver (Debian)
  ansible.builtin.command: service apache2 restart
  listen: "Restart webserver"
  when: ansible_os_family == 'Debian'
  failed_when: false

- name: Reload webserver (Debian)
  ansible.builtin.command: service apache2 reload
  listen: "Reload webserver"
  when: ansible_os_family == 'Debian'
  failed_when: false

# ── RedHat/Rocky ─────────────────────────────────────────────────────────────
- name: Restart webserver (RedHat)
  ansible.builtin.shell: >
    pkill -HUP httpd || /usr/sbin/httpd &
  listen: "Restart webserver"
  when: ansible_os_family == 'RedHat'
  failed_when: false

- name: Reload webserver (RedHat)
  ansible.builtin.shell: >
    /usr/sbin/httpd -k graceful || /usr/sbin/httpd &
  listen: "Reload webserver"
  when: ansible_os_family == 'RedHat'
  failed_when: false
